name: CI

on:
  push:
    branches:
      - main
    paths:
      - "back/**"
      - "front/**"
      - "deploy/**"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "GEMINI.md"
      - "CURSOR.md"
      - "COPILOT.md"
      - "docs/**"
      - "tools/guards/check-forbidden-tracked-files.sh"
      - "tools/test/check-forbidden-tracked-files.test.sh"
      - ".github/workflows/**"

permissions:
  contents: read
  pull-requests: read

jobs:
  backend-ci:
    permissions:
      contents: read
      issues: write
      pull-requests: write
    uses: ./.github/workflows/reusable-backend-quality.yml
    secrets:
      CI_DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
      CI_REDIS_PASSWORD: ${{ secrets.CI_REDIS_PASSWORD }}

  frontend-ci:
    uses: ./.github/workflows/reusable-frontend-verify.yml
