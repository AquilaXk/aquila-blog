name: Dependency Review

on:
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Dependency review readiness
        id: readiness
        shell: bash
        run: |
          if [ "${{ vars.DEPENDENCY_REVIEW_ENABLED }}" = "true" ]; then
            echo "run_review=true" >> "$GITHUB_OUTPUT"
            {
              echo "## Dependency review enabled"
              echo
              echo "- repository variable \`DEPENDENCY_REVIEW_ENABLED=true\` detected"
              echo "- dependency review action will run for this pull request"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "run_review=false" >> "$GITHUB_OUTPUT"
          echo "::notice title=Dependency review skipped::Enable Settings > Security > Advanced Security > Dependency Graph, then set repository variable DEPENDENCY_REVIEW_ENABLED=true."
          {
            echo "## Dependency review skipped"
            echo
            echo "- reason: Dependency Graph is disabled or has not been confirmed for this repository."
            echo "- enable: \`Settings > Security > Advanced Security > Dependency Graph\`"
            echo "- after enabling: set repository variable \`DEPENDENCY_REVIEW_ENABLED=true\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout
        if: steps.readiness.outputs.run_review == 'true'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Dependency review
        if: steps.readiness.outputs.run_review == 'true'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
