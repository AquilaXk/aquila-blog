name: CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "back/**"
      - "front/**"
      - "deploy/**"
      - "tools/guards/check-forbidden-tracked-files.sh"
      - ".github/workflows/**"

permissions:
  contents: read
  pull-requests: read

jobs:
  backend-ci:
    uses: ./.github/workflows/reusable-backend-quality.yml
    secrets:
      CI_DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
      CI_REDIS_PASSWORD: ${{ secrets.CI_REDIS_PASSWORD }}

  frontend-ci:
    uses: ./.github/workflows/reusable-frontend-verify.yml
