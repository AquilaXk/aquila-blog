# CI/로컬 공통 Kotlin 컴파일 안정화 설정
org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=768m -Dfile.encoding=UTF-8
kotlin.daemon.jvmargs=-Xmx3072m,-XX:MaxMetaspaceSize=1024m,-Dfile.encoding=UTF-8

# Kotlin + kapt 병행 시 메모리 피크를 낮추기 위해 동시 worker를 제한한다.
org.gradle.workers.max=2

# 빌드 재현성/속도 기본값
org.gradle.parallel=true
kotlin.incremental=true
