retentionRules:
  - activityId: account_registration_email
    retention: accountLifetimeUntilDeletionOrLegalHold
    destruction: softDeleteThenAnonymizeOrHardDeleteAfterRetention
    followUp: issue999
  - activityId: signup_email_verification
    retention: verificationTokenTtlPlusOperationalAuditWindow
    destruction: expireCancelConsumeThenPurgeByRetentionJob
    followUp: issue998
  - activityId: kakao_oauth_existing_login
    retention: accountLifetimeForLinkedIdentifier; transientStateCookieUntilCallback
    destruction: unlinkOrAccountDeletion; transientCookieExpiry
    followUp: issue997
  - activityId: kakao_oauth_pending_signup
    retention: pendingTokenTtlThenPurge; accountLifetimeAfterConsent
    destruction: expireCancelConsumeThenPurgeByRetentionJob; unlinkOrAccountDeletion
    followUp: issue997
  - activityId: auth_session_and_cookies
    retention: untilLogoutRevocationExpiryOrSessionCleanupJob
    destruction: revokeSessionExpireCookiePurgeExpiredSessions
    followUp: issue995
  - activityId: user_content_posts_comments
    retention: untilUserDeletionOrContentDeletion; publicCacheUntilRevalidation
    destruction: softDeleteThenCachePurge; anonymizeWhereRequired
    followUp: issue999
  - activityId: file_uploads_profile_post_cloud
    retention: activeUntilOwnerDeletion; tempUploadsUntilPurgeAfter; deletedObjectsUntilBackupExpiry
    destruction: objectDeleteAndMetadataMarkDeleted; backupExpiryOrTombstoneFutureWork
    followUp: issue1004
  - activityId: auth_security_events
    retention: securityAuditWindowThenCleanupJob
    destruction: scheduledPurgeAndLogRetentionExpiry
    followUp: issue1001
  - activityId: member_action_logs
    retention: operationalAuditWindowThenPurgePolicyRequired
    destruction: scheduledPurgeFutureWork
    followUp: issue1001
  - activityId: notifications_sse
    retention: notificationHistoryWindowThenPurgePolicyRequired
    destruction: accountDeletionOrRetentionJobFutureWork
    followUp: issue1000
  - activityId: analytics_and_rum
    retention: providerDefaultUnlessConfigured; localRumLogRetentionPolicyRequired
    destruction: providerRetentionControlsAndLocalLogExpiry
    followUp: issue1002
  - activityId: ai_tag_recommendation_gemini
    retention: noRawPromptRetentionIntended; providerRetentionRequiresContractReview
    destruction: noLocalPersistence; providerDeletionControlsReviewRequired
    followUp: issue1003
  - activityId: backup_and_restore
    retention: backupClassRetentionPolicyInDeployScripts; privacyTombstoneFutureWork
    destruction: pruneExternalBackupsAndDeployBackupRotation; encryptedDeletionFutureWork
    followUp: issue1004

principles:
  - Security or legal hold data must be separated from account-visible data during deletion handling.
  - Backup retention can outlive database deletion, so restore must replay deletion tombstones before traffic opens.
  - Analytics, RUM, and AI external processing must prefer aggregate or transient handling that does not require user identification.
