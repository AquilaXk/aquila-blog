  back/src/main/resources/**,\
  back/src/main/kotlin/com/back/BackApplication.kt

sonar.java.binaries=back/build/classes/java/main,back/build/classes/kotlin/main
sonar.coverage.jacoco.xmlReportPaths=back/build/reports/jacoco/pr/jacocoPrReport.xml
