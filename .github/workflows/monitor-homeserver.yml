name: Monitor Home Server

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check API health
        id: health
        shell: bash
        env:
          HEALTH_URL: ${{ secrets.HOME_HEALTHCHECK_URL || 'https://api.aquilaxk.site/actuator/health' }}
        run: |
          set -euo pipefail
          CODE="$(curl -sS -o /tmp/health.body -w "%{http_code}" "${HEALTH_URL}" || true)"
          BODY="$(cat /tmp/health.body || true)"

          echo "health_url=${HEALTH_URL}" >> "$GITHUB_OUTPUT"
          echo "http_code=${CODE}" >> "$GITHUB_OUTPUT"
          {
            echo "body<<EOF"
            echo "${BODY}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if ! echo "${CODE}" | grep -Eq '^[1-4][0-9][0-9]$'; then
            echo "healthcheck failed with status=${CODE}" >&2
            exit 1
          fi

      - name: Send alert webhook
        if: failure() && (secrets.HOME_ALERT_WEBHOOK_URL != '')
        shell: bash
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.HOME_ALERT_WEBHOOK_URL }}
          HEALTH_URL: ${{ steps.health.outputs.health_url }}
          HTTP_CODE: ${{ steps.health.outputs.http_code }}
          BODY: ${{ steps.health.outputs.body }}
        run: |
          set -euo pipefail
          ESCAPED_BODY="$(printf '%s' "${BODY}" | sed 's/"/\\"/g' | tr '\n' ' ' | cut -c1-700)"
          ESCAPED_URL="$(printf '%s' "${HEALTH_URL}" | sed 's/"/\\"/g')"
          ESCAPED_CODE="$(printf '%s' "${HTTP_CODE}" | sed 's/"/\\"/g')"

          PAYLOAD="$(cat <<EOF
{"text":"[homeserver-monitor] API healthcheck failed\nurl=${ESCAPED_URL}\nstatus=${ESCAPED_CODE}\nbody=${ESCAPED_BODY}"}
EOF
)"

          curl -sS -X POST -H "Content-Type: application/json" -d "${PAYLOAD}" "${ALERT_WEBHOOK_URL}" > /dev/null
