name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches-ignore:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "24"
          cache: gradle

      - name: Start test infrastructure (Postgres/Redis)
        run: docker compose -f back/devInfra/docker-compose.yml up -d

      - name: Run backend tests
        working-directory: back
        run: ./gradlew test

      - name: Stop test infrastructure
        if: always()
        run: docker compose -f back/devInfra/docker-compose.yml down -v
