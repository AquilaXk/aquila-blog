  "changeSummary": ["AI 기능 고지를 관리자 요약 생성 기준으로 갱신한 버전"],
  "sections": [
    {"id":"terms-purpose","title":"목적","body":["본 약관은 AquilaLog가 제공하는 기술 블로그, 계정, 댓글, 프로필, 파일 업로드, 알림, 관리자 도구 이용 조건과 운영자·이용자의 권리 의무를 정합니다."]},
    {"id":"terms-definitions","title":"용어 정의","body":["서비스는 AquilaLog 웹사이트와 관련 API를 의미합니다. 이용자는 서비스를 열람하거나 계정을 생성해 기능을 이용하는 사람을 의미합니다. 콘텐츠는 게시글, 댓글, 프로필, 업로드 파일, 태그, 링크 등 이용자가 입력하거나 게시한 정보를 의미합니다."]},
    {"id":"terms-operator","title":"운영자 정보 및 적용 범위","body":["AquilaLog는 개인 운영 기술 블로그 서비스이며, 본 약관은 서비스 화면, API, 회원 기능, 관리자 기능에 적용됩니다.","개별 기능에 별도 안내가 있는 경우 해당 안내가 본 약관과 함께 적용됩니다."]},
    {"id":"terms-change-notice","title":"약관 게시·변경·통지","body":["운영자는 약관을 서비스 화면에 게시하고, 법령·서비스 구조·운영 정책 변경 시 약관을 개정할 수 있습니다.","중요한 변경은 시행일, version, 변경 요약을 명시해 고지하며, 필요한 경우 재동의 절차를 적용합니다."]},
    {"id":"terms-contract","title":"이용계약 성립","body":["이메일 회원가입은 이메일 인증, 필수 약관 동의, 개인정보 처리 안내 확인, 만 14세 이상 확인 후 계정 생성으로 성립합니다.","OAuth는 기존 연결 계정 로그인 수단으로 제공하며, 신규 OAuth 가입은 별도 pending consent 흐름이 완성된 뒤 제공합니다."]},
    {"id":"terms-age","title":"이용 자격과 만 14세 미만 정책","body":["AquilaLog는 만 14세 미만 이용자의 회원가입을 의도적으로 허용하지 않습니다.","만 14세 미만 이용 사실이 확인되면 계정 제한, 삭제, 보호자 확인 등 필요한 조치를 진행합니다."]},
    {"id":"terms-account-security","title":"계정 생성·관리·보안","body":["이용자는 본인이 관리하는 이메일과 인증 수단을 사용해야 하며, 계정과 로그인 세션을 안전하게 관리해야 합니다.","도용, 비정상 접근, 보안 위험, 과도한 실패 시도가 확인되면 이용 제한이나 추가 확인이 요구될 수 있습니다."]},
    {"id":"terms-service","title":"서비스 내용","body":["서비스는 기술 글 열람, 댓글 작성, 프로필 표시, 파일 업로드, 알림, 검색, 관리자 게시 기능을 제공합니다.","운영, 보안, 장애 대응, 비용, 법령 준수 사유로 일부 기능을 변경, 제한, 중단할 수 있습니다."]},
    {"id":"terms-content","title":"게시글·댓글·파일 등 이용자 콘텐츠","body":["이용자는 본인이 권리를 보유하거나 이용 권한이 있는 콘텐츠만 게시해야 합니다.","타인의 개인정보, 저작권, 상표, 초상권, 명예, 영업비밀, 기밀정보를 침해하는 콘텐츠를 게시해서는 안 됩니다."]},
    {"id":"terms-license","title":"이용자 콘텐츠의 저작권과 서비스 이용허락","body":["이용자가 작성한 콘텐츠의 권리는 이용자에게 남습니다.","이용자는 서비스 저장, 전송, 표시, 백업, 보안 점검, 신고 처리, 장애 복구에 필요한 범위에서 비독점적 이용허락을 부여합니다.","삭제 또는 탈퇴 후에는 법령상 보관, 보안 감사, 백업 만료에 필요한 범위를 제외하고 이용허락도 종료됩니다."]},
    {"id":"terms-prohibited","title":"금지행위","body":["불법 정보 게시, 타인의 개인정보 공개, 권리 침해, 명예훼손, 악성코드·피싱, 계정 탈취, 보안 우회, 자동화 남용, 부하 공격, 스팸, 과도한 광고, 업로드 제한 우회를 금지합니다.","AI 기능에 개인정보, 기밀정보, 제3자 권리 침해 자료를 입력하는 행위를 금지합니다."]},
    {"id":"terms-enforcement","title":"신고·노출 제한·삭제·계정 제재 절차","body":["위반 유형과 긴급성에 따라 콘텐츠 숨김, 삭제, 기능 제한, 세션 무효화, 계정 제한, 접근 차단, 증거 보존, 관계 기관 신고를 할 수 있습니다.","가능한 경우 사전 또는 사후에 사유를 안내하며, 이용자는 aquilaxk10@gmail.com으로 이의를 제기할 수 있습니다."]},
    {"id":"terms-maintenance","title":"서비스 변경·점검·중단","body":["배포, 유지보수, 보안 조치, 서버 장애, 외부 서비스 장애, 비용 또는 운영상 사유로 서비스 일부 또는 전체가 변경·중단될 수 있습니다.","중요한 중단이 예상되면 가능한 범위에서 사전 또는 사후 안내합니다."]},
    {"id":"terms-external","title":"외부 서비스와 링크","body":["서비스는 Vercel, Cloudflare, Kakao, Google, GitHub, SMTP provider 등 외부 서비스를 사용할 수 있습니다.","외부 링크나 외부 서비스의 정책, 장애, 보안 사고는 해당 제공자의 약관과 정책이 적용될 수 있습니다."]},
    {"id":"terms-ai","title":"AI 기능","body":["관리자 요약 생성 등 AI 기능은 보조 도구이며, 생성 결과의 정확성, 적법성, 적절성은 사용 전 확인해야 합니다.","개인정보나 기밀정보를 AI 기능에 입력하지 않아야 하며, 운영자는 AI 외부 처리 조건을 별도 고지합니다."]},
    {"id":"terms-withdrawal","title":"회원 탈퇴와 계약 종료","body":["이용자는 계정 탈퇴와 데이터 삭제를 요청할 수 있습니다.","탈퇴 시 계정 접근과 세션은 종료되며, 법령상 보관, 보안 감사, 백업 만료, 분쟁 대응에 필요한 일부 데이터는 제한적으로 보관될 수 있습니다."]},
    {"id":"terms-privacy","title":"개인정보 처리","body":["개인정보 처리 기준, 항목, 보유기간, 처리위탁, 국외이전, 권리 행사 방법은 개인정보처리방침에서 정합니다.","약관과 개인정보처리방침이 충돌하면 개인정보 처리에 관해서는 개인정보처리방침과 관계 법령을 우선 적용합니다."]},
    {"id":"terms-liability","title":"책임의 범위","body":["운영자의 고의 또는 중대한 과실, 관계 법령상 배제할 수 없는 책임은 제한하지 않습니다.","그 외 이용자의 귀책 사유, 외부 플랫폼 장애, 네트워크 문제, 제3자 행위, 이용자가 게시한 콘텐츠로 발생한 손해에 대해서는 법령이 허용하는 범위에서 책임을 제한합니다."]},
    {"id":"terms-damages","title":"손해배상","body":["이용자가 본 약관 또는 법령을 위반해 서비스, 운영자, 다른 이용자, 제3자에게 손해를 발생시킨 경우 그 손해를 배상해야 할 수 있습니다.","운영자는 서비스의 보안과 안정성을 위해 합리적인 조치를 수행합니다."]},
    {"id":"terms-notice","title":"통지","body":["운영자는 서비스 화면, 이메일, 게시글, GitHub 또는 이용자가 확인할 수 있는 적절한 방법으로 통지할 수 있습니다.","이용자는 계정 이메일과 연락 가능한 정보를 최신 상태로 유지해야 합니다."]},
    {"id":"terms-law-dispute","title":"준거법·분쟁 해결","body":["본 약관은 대한민국 법령을 기준으로 해석합니다.","분쟁이 발생하면 먼저 운영 메일로 사실관계를 협의하며, 법령상 관할과 절차에 따라 해결합니다. 이용자에게 부당하게 불리한 전속 관할을 일방적으로 강제하지 않습니다."]},
    {"id":"terms-history","title":"시행일·이전 버전","body":["현재 시행 버전은 1.0.2이며 시행일은 2026-06-29입니다.","이전 버전 1.0.1과 1.0.0은 변경하지 않고 보존합니다.","약관 변경 시 version, publishedAt, effectiveAt, contentSha256, supersedes, changeSummary를 가진 새 문서를 추가하고 이전 버전은 수정하지 않습니다."]}
  ]
}
