groups:
  - name: aquila-app-exceptions
    rules:
      - alert: AquilaAppException5xxSpike
        expr: sum(rate(app_exception_total{status=~"5.."}[5m])) > 0.2
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "App exception 5xx spike detected"
          description: "app_exception_total 5xx rate={{ $value }} for 5m. Check ExceptionHandler and filter/security error sources by resultCode."

      - alert: AquilaAppException403Spike
        expr: sum(rate(app_exception_total{status="403"}[10m])) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "App exception 403 spike detected"
          description: "app_exception_total 403 rate={{ $value }} for 10m. Check CSRF/access-denied abuse signals by resultCode."
