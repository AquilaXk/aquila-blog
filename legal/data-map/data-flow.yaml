flows:
  - id: email_signup
    collectionPoint: /signup and /member/api/v1/signup/email/start
    stores:
      - PostgreSQL member
      - PostgreSQL member_signup_verification
    processors:
      - home_server_postgresql
      - home_server_redis
      - smtp_provider_unconfirmed
    status: provider/region/DPA эЩХьаХ эХДьЪФ
  - id: kakao_oauth_login
    collectionPoint: Kakao redirect and Spring Security OAuth2
    stores:
      - PostgreSQL member
      - PostgreSQL pending_oauth_signup for new applicants
      - PostgreSQL member_legal_acceptance after consent
      - OAuth state cookie
    processors:
      - home_server_postgresql
      - kakao_oauth
    status: ьЛаъ╖Ь ъ░АьЮЕьЭА /signup/social/complete pending ыПЩьЭШ ьЩДыгМ эЫД ъ│ДьаХ ьГЭьД▒
  - id: auth_session
    collectionPoint: login form and auth filter
    stores:
      - PostgreSQL member_session
      - HttpOnly browser cookies
    processors:
      - home_server_postgresql
      - home_server_redis
      - vercel_frontend_hosting
      - cloudflare_dns_proxy
    status: cookie inventoryыКФ policy versioning ьЮСьЧЕьЧРьДЬ эЩХьаХ
  - id: posts_comments_profile
    collectionPoint: admin editor, comment form, profile editor
    stores:
      - PostgreSQL post
      - PostgreSQL post_comment
      - PostgreSQL member profile columns
      - public frontend cache
    processors:
      - home_server_postgresql
      - home_server_redis
      - vercel_frontend_hosting
      - cloudflare_dns_proxy
    status: deletion/exportыКФ issue999
  - id: uploads
    collectionPoint: post/profile/cloud multipart upload
    stores:
      - PostgreSQL uploaded_file
      - PostgreSQL cloud_file
      - MinIO object storage
    processors:
      - home_server_postgresql
      - home_server_minio
      - home_server_backup_storage
      - cloudflare_dns_proxy
    status: restore tombstoneьЭА issue1004
  - id: security_and_action_logs
    collectionPoint: auth filter and domain events
    stores:
      - PostgreSQL auth_security_event
      - PostgreSQL member_action_log
      - Loki logs
    processors:
      - home_server_postgresql
      - home_server_redis
      - grafana_loki_monitoring
    status: auth security identifiers and member action log bodies are minimized by issue1001
  - id: notifications_sse
    collectionPoint: post/comment domain events and SSE API
    stores:
      - PostgreSQL member_notification
      - runtime SSE memory
    processors:
      - home_server_postgresql
      - home_server_redis
      - vercel_frontend_hosting
      - cloudflare_dns_proxy
    status: PostgreSQL member_notification is purged after custom.privacy.retention.notificationDays, default 60 days
  - id: analytics_rum
    collectionPoint: browser runtime after optional tracking consent, /api/rum/vitals, and /api/rum/client-errors
    stores:
      - Google Analytics property
      - Vercel analytics
      - application logs for custom RUM
    processors:
      - google_analytics
      - vercel_frontend_hosting
      - grafana_loki_monitoring
    status: /settings/privacy consent managerьЩА opt-out guard ъ╡мэШД
  - id: gemini_ai_summary
    collectionPoint: admin editor AI summary request
    stores:
      - transient backend request
      - optional AI trace metadata
    processors:
      - google_gemini
      - vercel_frontend_hosting
      - home_server_postgresql
    status: default-off/PII scanner/DPAыКФ issue1003
  - id: backup_restore
    collectionPoint: deploy and backup scripts
    stores:
      - home server backup root
      - GitHub Actions workflow logs
      - GHCR package metadata
    processors:
      - home_server_backup_storage
      - github_actions
      - ghcr_container_registry
    status: encryption/tombstoneьЭА issue1004

reviewBlockers:
  - SMTP provider name, region, TLS mode, DPA, retention policy
  - Gemini optional AI production default-off, DPA, retention, training opt-out
  - Backup encryption and deletion tombstone replay

