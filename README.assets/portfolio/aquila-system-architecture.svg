<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">Aquila Blog system architecture</title>
  <desc id="desc">Architecture diagram showing Vercel Next.js frontend, Cloudflare Tunnel, home server Caddy ingress, Spring Boot Kotlin runtime, PostgreSQL, Redis, MinIO, observability, and GitHub Actions deployment.</desc>
  <defs>
    <style>
      .bg{fill:#f7f9fc}
      .panel{fill:#fff;stroke:#cbd7e6;stroke-width:2}
      .panel-blue{stroke:#79a7ff}
      .panel-green{stroke:#72cf90}
      .panel-orange{stroke:#ffc36f}
      .label{font:700 18px Arial,sans-serif;letter-spacing:.2px}
      .title{font:800 44px Arial,sans-serif;fill:#102033}
      .subtitle{font:500 20px Arial,sans-serif;fill:#5d6b7c}
      .h2{font:800 27px Arial,sans-serif;fill:#15243a}
      .h3{font:700 20px Arial,sans-serif;fill:#15243a}
      .text{font:500 16px Arial,sans-serif;fill:#4c5b70}
      .small{font:500 14px Arial,sans-serif;fill:#607086}
      .mono{font:700 15px Arial,sans-serif;fill:#22314a}
      .arrow{stroke:#2468db;stroke-width:4;fill:none;marker-end:url(#arrowHead)}
      .dash{stroke:#df8500;stroke-width:3;stroke-dasharray:8 8;fill:none;marker-end:url(#deployHead)}
      .runtime{fill:#f8fbff;stroke:#b8cbea;stroke-width:1.5}
      .card{fill:#fbfdff;stroke:#d8e1ef;stroke-width:1.5}
    </style>
    <marker id="arrowHead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2468db"/>
    </marker>
    <marker id="deployHead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#df8500"/>
    </marker>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0" stop-color="#1259d9"/>
      <stop offset="1" stop-color="#1f8fff"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="1">
      <stop offset="0" stop-color="#087a36"/>
      <stop offset="1" stop-color="#22a75a"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" x2="1">
      <stop offset="0" stop-color="#c56800"/>
      <stop offset="1" stop-color="#ff9c2f"/>
    </linearGradient>
  </defs>

  <rect class="bg" width="1672" height="941"/>
  <circle cx="225" cy="40" r="240" fill="#2e5bff" opacity=".06"/>
  <circle cx="1375" cy="170" r="260" fill="#22c55e" opacity=".06"/>

  <text x="54" y="72" class="title">Aquila Blog Architecture</text>
  <text x="56" y="108" class="subtitle">Public blog, admin content workspace, and home-server operations</text>
  <rect x="1228" y="52" width="388" height="48" rx="14" class="panel"/>
  <text x="1252" y="83" class="mono">Production: Vercel + Cloudflare Tunnel + Home Server</text>

  <rect x="58" y="148" width="360" height="360" rx="22" class="panel panel-blue"/>
  <rect x="90" y="126" width="300" height="44" rx="12" fill="url(#blue)"/>
  <text x="123" y="154" class="label" fill="#fff">Frontend</text>
  <text x="96" y="216" class="h2">Vercel / Next.js</text>
  <rect x="92" y="250" width="292" height="98" rx="14" class="card"/>
  <text x="116" y="282" class="h3">Next.js 15 Pages Router</text>
  <text x="116" y="311" class="text">React 18 + TypeScript</text>
  <text x="116" y="336" class="small">SSR, public blog, admin routes</text>
  <rect x="92" y="370" width="292" height="104" rx="14" class="card"/>
  <text x="116" y="402" class="h3">Content UI</text>
  <text x="116" y="431" class="text">Feed, post detail, search, tags</text>
  <text x="116" y="456" class="small">Editor, preview, publish workflow</text>

  <rect x="456" y="226" width="244" height="168" rx="20" class="panel panel-orange"/>
  <rect x="493" y="204" width="170" height="44" rx="12" fill="url(#orange)"/>
  <text x="524" y="232" class="label" fill="#fff">Edge</text>
  <text x="493" y="288" class="h2">Cloudflare Tunnel</text>
  <text x="493" y="326" class="text">Public ingress to Caddy</text>
  <text x="493" y="351" class="small">Host ports stay loopback-bound</text>

  <rect x="744" y="148" width="504" height="360" rx="22" class="panel panel-green"/>
  <rect x="842" y="126" width="308" height="44" rx="12" fill="url(#green)"/>
  <text x="895" y="154" class="label" fill="#fff">Home Server</text>
  <text x="786" y="216" class="h2">Caddy + Docker Compose</text>
  <rect x="786" y="250" width="420" height="90" rx="14" class="card"/>
  <text x="810" y="282" class="h3">Spring Boot 4 / Kotlin API</text>
  <text x="810" y="311" class="text">Reverse proxy, health routes, rollback scripts</text>
  <rect x="786" y="362" width="126" height="104" rx="14" class="runtime"/>
  <text x="809" y="393" class="h3">blue / green</text>
  <text x="809" y="421" class="small">Zero-downtime</text>
  <text x="809" y="443" class="small">API cutover</text>
  <rect x="932" y="362" width="126" height="104" rx="14" class="runtime"/>
  <text x="965" y="393" class="h3">read</text>
  <text x="955" y="421" class="small">Public read</text>
  <text x="955" y="443" class="small">runtime mode</text>
  <rect x="1078" y="362" width="126" height="104" rx="14" class="runtime"/>
  <text x="1094" y="393" class="h3">admin / worker</text>
  <text x="1102" y="421" class="small">Ops, jobs,</text>
  <text x="1102" y="443" class="small">cleanup</text>

  <rect x="1290" y="148" width="326" height="360" rx="22" class="panel panel-blue"/>
  <rect x="1360" y="126" width="186" height="44" rx="12" fill="url(#blue)"/>
  <text x="1401" y="154" class="label" fill="#fff">Data</text>
  <rect x="1326" y="202" width="254" height="78" rx="14" class="card"/>
  <text x="1350" y="234" class="h3">PostgreSQL</text>
  <text x="1350" y="262" class="small">Posts, members, Flyway, backups</text>
  <rect x="1326" y="300" width="254" height="78" rx="14" class="card"/>
  <text x="1350" y="332" class="h3">Redis</text>
  <text x="1350" y="360" class="small">Cache, sessions, queues, locks</text>
  <rect x="1326" y="398" width="254" height="78" rx="14" class="card"/>
  <text x="1350" y="430" class="h3">MinIO</text>
  <text x="1350" y="458" class="small">Image and object storage</text>

  <path d="M418 328 H456" class="arrow"/>
  <path d="M700 310 H744" class="arrow"/>
  <path d="M1248 310 H1290" class="arrow"/>

  <rect x="58" y="574" width="498" height="250" rx="22" class="panel panel-orange"/>
  <rect x="90" y="552" width="202" height="44" rx="12" fill="url(#orange)"/>
  <text x="128" y="580" class="label" fill="#fff">CI / CD</text>
  <rect x="92" y="628" width="132" height="90" rx="14" class="card"/>
  <text x="114" y="660" class="h3">Actions</text>
  <text x="114" y="688" class="small">Lint, test, build</text>
  <rect x="242" y="628" width="132" height="90" rx="14" class="card"/>
  <text x="267" y="660" class="h3">Image</text>
  <text x="267" y="688" class="small">Backend image</text>
  <rect x="392" y="628" width="132" height="90" rx="14" class="card"/>
  <text x="421" y="660" class="h3">Deploy</text>
  <text x="414" y="688" class="small">SSH blue/green</text>
  <text x="92" y="760" class="text">PR to main runs checks.</text>
  <text x="92" y="790" class="text">Main merge starts home-server deployment and live E2E verification.</text>
  <path d="M224 673 H242" class="dash"/>
  <path d="M374 673 H392" class="dash"/>

  <rect x="596" y="574" width="468" height="250" rx="22" class="panel panel-orange"/>
  <rect x="628" y="552" width="234" height="44" rx="12" fill="url(#orange)"/>
  <text x="669" y="580" class="label" fill="#fff">Observability</text>
  <rect x="630" y="628" width="190" height="78" rx="14" class="card"/>
  <text x="654" y="660" class="h3">Prometheus</text>
  <text x="654" y="688" class="small">Metrics and alerts</text>
  <rect x="840" y="628" width="190" height="78" rx="14" class="card"/>
  <text x="864" y="660" class="h3">Loki / Promtail</text>
  <text x="864" y="688" class="small">Container logs</text>
  <rect x="630" y="728" width="400" height="62" rx="14" class="card"/>
  <text x="654" y="755" class="text">Grafana, Alertmanager</text>
  <text x="654" y="785" class="text">public_edge_probe, docker_runtime_probe</text>

  <rect x="1104" y="574" width="512" height="250" rx="22" class="panel panel-green"/>
  <rect x="1136" y="552" width="216" height="44" rx="12" fill="url(#green)"/>
  <text x="1179" y="580" class="label" fill="#fff">Operations</text>
  <rect x="1138" y="628" width="204" height="78" rx="14" class="card"/>
  <text x="1162" y="660" class="h3">Backups</text>
  <text x="1162" y="688" class="small">PostgreSQL and MinIO drills</text>
  <rect x="1368" y="628" width="204" height="78" rx="14" class="card"/>
  <text x="1392" y="660" class="h3">Hardening</text>
  <text x="1392" y="688" class="small">Cloudflare-first ingress</text>
  <rect x="1138" y="728" width="434" height="62" rx="14" class="card"/>
  <text x="1162" y="755" class="text">Legacy Terraform remains experimental.</text>
  <text x="1162" y="785" class="text">Production uses homeserver deploy.</text>

  <path d="M996 508 V552" class="dash"/>
  <path d="M556 700 H596" class="dash"/>
  <path d="M1064 700 H1104" class="arrow"/>

  <text x="58" y="890" class="small">Source of truth: front/package.json, back/build.gradle.kts, deploy/homeserver/docker-compose.prod.yml, deploy/homeserver/caddy/Caddyfile</text>
</svg>
