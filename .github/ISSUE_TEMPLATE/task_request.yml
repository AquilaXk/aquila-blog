name: "🔧 Task"
description: "리팩터링, 문서, 테스트, 운영, 빌드 작업을 등록합니다."
labels: ["task"]
body:
  - type: dropdown
    id: task_type
    attributes:
      label: Task Type
      options:
        - Refactor
        - Docs
        - Test
        - Build / CI
        - Ops
        - Security
        - Chore
    validations:
      required: true

  - type: input
    id: domain
    attributes:
      label: Domain
      description: 관련 모듈이나 영역을 적어주세요.
      placeholder: 예) back/post, front/editor, admin/dashboard, github-actions
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Description
      description: 어떤 작업인지, 왜 필요한지 적어주세요.
      placeholder: 예) 검색 쿼리 서비스 책임을 분리해 유지보수성과 테스트 범위를 정리합니다.
    validations:
      required: true

  - type: textarea
    id: done_when
    attributes:
      label: Done When
      description: 완료 조건을 적어주세요.
      placeholder: |
        - [ ] 조건 A
        - [ ] 조건 B
    validations:
      required: true

  - type: textarea
    id: todo
    attributes:
      label: Todo
      description: 실제 작업 항목을 체크리스트로 적어주세요.
      placeholder: |
        - [ ] 대상 파악
        - [ ] 변경 적용
        - [ ] 테스트 / 검증
        - [ ] 문서 반영
    validations:
      required: true
