name: Reusable Backend Quality

on:
  workflow_call:
    secrets:
      CI_DB_PASSWORD:
        required: true
      CI_REDIS_PASSWORD:
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    env:
      TEST_DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
      TEST_REDIS_PASSWORD: ${{ secrets.CI_REDIS_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Detect backend-related changes
        id: changes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            api_url="${{ github.api_url }}/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files?per_page=100"
            changed_files="${RUNNER_TEMP}/changed-files.txt"
            : > "${changed_files}"

            while [ -n "${api_url}" ]; do
              response_headers="${RUNNER_TEMP}/github-response-headers.txt"
              response_body="${RUNNER_TEMP}/github-response-body.json"
              curl -fsSL \
                -D "${response_headers}" \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "${api_url}" > "${response_body}"
              jq -r '.[].filename' "${response_body}" >> "${changed_files}"
              api_url="$(
                awk -F'[<>]' '/rel="next"/ { print $2 }' "${response_headers}" | tail -n 1
              )"
            done
          else
            echo "backend=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          backend=false
          while IFS= read -r file; do
            case "${file}" in
              back/*|deploy/homeserver/*|tools/ci/*|tools/guards/check-forbidden-tracked-files.sh|tools/test/check-forbidden-tracked-files.test.sh|.github/workflows/backend-ci.yml|.github/workflows/ci.yml|.github/workflows/deploy.yml|.github/workflows/reusable-backend-quality.yml)
                backend=true
                break
                ;;
            esac
          done < "${RUNNER_TEMP}/changed-files.txt"

          echo "backend=${backend}" >> "${GITHUB_OUTPUT}"

      - name: Guard forbidden AI docs and tool metadata
        run: bash tools/guards/check-forbidden-tracked-files.sh

      - name: Test forbidden tracked file guard
        run: bash tools/test/check-forbidden-tracked-files.test.sh

      - name: Dependency review readiness
        if: github.event_name == 'pull_request'
        id: dependency_review
        shell: bash
        run: |
          if [ "${{ vars.DEPENDENCY_REVIEW_ENABLED }}" = "true" ]; then
            echo "run_review=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "run_review=false" >> "$GITHUB_OUTPUT"
          echo "::notice title=Dependency review skipped::Enable Settings > Security > Advanced Security > Dependency Graph, then set repository variable DEPENDENCY_REVIEW_ENABLED=true."
          {
            echo "## Dependency review skipped"
            echo
            echo "- reason: Dependency Graph is disabled or has not been confirmed for this repository."
            echo "- enable: \`Settings > Security > Advanced Security > Dependency Graph\`"
            echo "- after enabling: set repository variable \`DEPENDENCY_REVIEW_ENABLED=true\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dependency review
        if: github.event_name == 'pull_request' && steps.dependency_review.outputs.run_review == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          report="${RUNNER_TEMP}/dependency-review.json"
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${{ github.api_url }}/repos/${{ github.repository }}/dependency-graph/compare/${BASE_SHA}...${HEAD_SHA}" \
            > "${report}"

          python3 - "${report}" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as handle:
              dependencies = json.load(handle)

          vulnerable = [
              item
              for item in dependencies
              if item.get("change_type") in {"added", "changed"} and item.get("vulnerabilities")
          ]

          if vulnerable:
              for item in vulnerable:
                  name = item.get("name", "unknown")
                  version = item.get("version", "unknown")
                  vulns = ", ".join(
                      vulnerability.get("advisory_ghsa_id", "unknown")
                      for vulnerability in item.get("vulnerabilities", [])
                  )
                  print(f"vulnerable dependency: {name}@{version} ({vulns})")
              sys.exit(1)

          print("Dependency review passed: no vulnerable added or changed dependencies.")
          PY

      - name: Skip backend-heavy checks
        if: steps.changes.outputs.backend != 'true'
        run: |
          echo "No backend-related changes detected."
          {
            echo "## Backend CI"
            echo "- backend-heavy checks skipped"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up JDK 24
        if: steps.changes.outputs.backend == 'true'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "24"
          cache: gradle

      - name: Validate Flyway migration naming
        if: steps.changes.outputs.backend == 'true'
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(back/src/main/resources/db/migration/*.sql)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No migration files found."
            exit 1
          fi

          invalid=0
          for file in "${files[@]}"; do
            base="$(basename "$file")"
            if [[ "$base" =~ ^V[0-9]{8}_[0-9]{2}__[a-z0-9_]+\.sql$ ]] || [[ "$base" =~ ^R__[a-z0-9_]+\.sql$ ]]; then
              continue
            fi
            echo "Invalid migration file name: $base"
            invalid=1
          done

          if [ $invalid -ne 0 ]; then
            echo "Migration naming rule violation detected."
            exit 1
          fi

      - name: Run backend fast check
        if: steps.changes.outputs.backend == 'true'
        working-directory: back
        run: ./gradlew ciFastCheck --rerun-tasks

      - name: Set up Node.js for contract drift check
        if: steps.changes.outputs.backend == 'true'
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: front/yarn.lock

      - name: Install frontend dependencies for contract drift check
        if: steps.changes.outputs.backend == 'true'
        working-directory: front
        run: yarn install --frozen-lockfile

      - name: Verify backend OpenAPI contract drift
        if: steps.changes.outputs.backend == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cp back/build/openapi/openapi.json front/contracts/openapi/openapi.json
          (cd front && yarn contracts:check)

      - name: Comment Jacoco coverage summary
        if: always() && github.event_name == 'pull_request' && steps.changes.outputs.backend == 'true' && github.event.pull_request.head.repo.full_name == github.repository && hashFiles('back/build/reports/jacoco/pr/jacocoPrReport.xml') != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          summary_file="${RUNNER_TEMP}/jacoco-summary.md"
          comments_file="${RUNNER_TEMP}/pr-comments.json"
          changed_files="${RUNNER_TEMP}/changed-files.txt"

          git diff --name-only "origin/${GITHUB_BASE_REF}...HEAD" > "${changed_files}"

          python3 tools/ci/comment-jacoco-summary.py \
            back/build/reports/jacoco/pr/jacocoPrReport.xml \
            back/config/jacoco-coverage-baseline-excludes.txt \
            --changed-files "${changed_files}" \
            > "${summary_file}"

          gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --paginate > "${comments_file}"
          comment_id="$(
            python3 -c 'import json, sys; marker = "<!-- aquila-blog:jacoco-coverage-summary -->"; comments = json.load(open(sys.argv[1], encoding="utf-8")); print(next((item["id"] for item in comments if marker in item.get("body", "")), ""))' "${comments_file}"
          )"

          body="$(cat "${summary_file}")"
          if [[ -n "${comment_id}" ]]; then
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" --field body="${body}"
          else
            gh api --method POST "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --field body="${body}"
          fi

          cat "${summary_file}" >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload Jacoco PR report
        if: always() && steps.changes.outputs.backend == 'true' && hashFiles('back/build/reports/jacoco/pr/jacocoPrReport.xml') != ''
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: jacoco-pr-report
          path: |
            back/build/reports/jacoco/pr/jacocoPrReport.xml
            back/build/reports/jacoco/pr/html
          if-no-files-found: error
          retention-days: 7

      - name: Upload backend reports on failure
        if: failure() && steps.changes.outputs.backend == 'true'
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: backend-ci-reports
          path: |
            back/build/reports/tests/test
            back/build/test-results/test
            back/build/reports/ktlint
            back/build/reports/jacoco/pr
          retention-days: 7
