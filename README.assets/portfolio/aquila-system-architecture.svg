<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">Aquila Blog system architecture</title>
  <desc id="desc">Architecture diagram showing Vercel Next.js frontend, Cloudflare Tunnel through Caddy, Spring Boot Kotlin backend, PostgreSQL, Redis, MinIO, observability, and GitHub Actions deployment.</desc>
  <defs>
    <linearGradient id="blueHdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0759cf"/>
      <stop offset="1" stop-color="#0c69e8"/>
    </linearGradient>
    <linearGradient id="greenHdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#047200"/>
      <stop offset="1" stop-color="#0b8d0e"/>
    </linearGradient>
    <linearGradient id="purpleHdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6424d8"/>
      <stop offset="1" stop-color="#8426e3"/>
    </linearGradient>
    <linearGradient id="infraHdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#075bd0"/>
      <stop offset="1" stop-color="#0b65e3"/>
    </linearGradient>
    <linearGradient id="hostingFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e9f3ff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="hostingHead" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e6f3ff"/>
      <stop offset="1" stop-color="#dceeff"/>
    </linearGradient>
    <linearGradient id="artifactFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfff8"/>
      <stop offset="1" stop-color="#f4fbf3"/>
    </linearGradient>
    <linearGradient id="ciHead" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff8e8"/>
      <stop offset="1" stop-color="#fff0d0"/>
    </linearGradient>
    <linearGradient id="noteFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f7fbff"/>
    </linearGradient>
    <filter id="panelShadow" x="-6%" y="-6%" width="112%" height="112%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="blur"/>
      <feOffset in="blur" dx="0" dy="1.2" result="offset"/>
      <feFlood flood-color="#7188a8" flood-opacity="0.18" result="color"/>
      <feComposite in="color" in2="offset" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="headerShadow" x="-10%" y="-10%" width="120%" height="125%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="blur"/>
      <feOffset in="blur" dx="0" dy="1.6" result="offset"/>
      <feFlood flood-color="#1d2d4d" flood-opacity="0.23" result="color"/>
      <feComposite in="color" in2="offset" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
    .txt, .title { font-family: 'Noto Sans CJK KR','Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif; text-rendering: geometricPrecision; }
    .title { letter-spacing: -0.7px; }
    .panel { fill:#fff; stroke:#6f7f9c; stroke-width:1.8; filter:url(#panelShadow); }
    .card { fill:#fff; stroke:#a7b3c7; stroke-width:1.6; }
    .blueFlow { stroke:#075bbb; stroke-width:4.2; fill:none; stroke-linejoin:round; stroke-linecap:butt; }
    .bluePlain { stroke:#075bbb; stroke-width:4.2; fill:none; stroke-linejoin:round; stroke-linecap:butt; }
    .greenDash { stroke:#27b52f; stroke-width:2.2; stroke-dasharray:5 5; fill:none; stroke-linejoin:round; stroke-linecap:round; }
    .greenDashPlain { stroke:#27b52f; stroke-width:2.2; stroke-dasharray:5 5; fill:none; stroke-linejoin:round; stroke-linecap:round; }
    .orangeDash { stroke:#ffa000; stroke-width:2.5; stroke-dasharray:6 5; fill:none; stroke-linejoin:round; stroke-linecap:round; }
    .orangeDashPlain { stroke:#ffa000; stroke-width:2.5; stroke-dasharray:6 5; fill:none; stroke-linejoin:round; stroke-linecap:round; }
  </style>
