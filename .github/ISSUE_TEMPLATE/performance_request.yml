name: "⚡ Performance"
description: "렌더링, 번들, 대량 조회, 병목처럼 성능 개선이 필요한 작업을 정리합니다."
labels: ["performance"]
body:
  - type: input
    id: target
    attributes:
      label: Target
      description: 어느 페이지, API, 렌더 경로를 개선하려는지 적어 주세요.
      placeholder: 예) /posts/[id], GET /post/api/v1/posts/search, front build bundle
    validations:
      required: true

  - type: textarea
    id: scenario
    attributes:
      label: Scenario
      description: 어떤 트래픽, 데이터 규모, 사용 시나리오에서 문제가 드러나는지 설명해 주세요.
      placeholder: 예) 공개 글 상세 새로고침 시 hydration mismatch와 CLS 급등이 함께 발생
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: Current Metric
      description: 현재 확인한 성능 지표나 체감 문제를 적어 주세요.
      placeholder: 예) p95 3.1s, JS 420KB, CLS 0.38
    validations:
      required: true

  - type: textarea
    id: target_metric
    attributes:
      label: Target Metric
      description: 개선 후 어느 수준까지 맞추고 싶은지 적어 주세요.
      placeholder: 예) p95 1.2s 이하, JS 300KB 이하, CLS 0.1 이하
    validations:
      required: true

  - type: textarea
    id: hypothesis
    attributes:
      label: Bottleneck / Hypothesis
      description: 병목 원인 추정이나 먼저 확인해야 할 포인트를 설명해 주세요.
      placeholder: 예) 초기 hydration 후 DOM 변형, 검색 쿼리 candidate pool 과다, 이미지 레이아웃 시프트

  - type: textarea
    id: validation
    attributes:
      label: Validation Plan
      description: 개선 후 어떤 방식으로 확인할지 `...했는가?` 형태로 적어 주세요.
      placeholder: |
        - [ ] 같은 시나리오에서 다시 계측했는가?
        - [ ] 로컬 검증과 실페이지 검증을 모두 수행했는가?
        - [ ] 이전 지표와 개선 후 지표를 비교했는가?
    validations:
      required: true

  - type: textarea
    id: todo
    attributes:
      label: Todo
      description: 작업 순서를 `...했는가?` 형태의 체크리스트로 적어 주세요.
      placeholder: |
        - [ ] 병목을 같은 조건에서 재현했는가?
        - [ ] 계측/프로파일링으로 원인을 좁혔는가?
        - [ ] 개선 후 성능을 다시 측정했는가?
        - [ ] 롤백 기준과 운영 영향까지 정리했는가?
    validations:
      required: true
