name: Production E2E Smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare workflow scripts
        run: chmod +x .github/scripts/*.sh

      - name: Run public smoke
        env:
          BASE_URL: ${{ secrets.HOME_API_BASE_URL || 'https://api.aquilaxk.site' }}
          OAUTH_PROVIDER: ${{ secrets.E2E_OAUTH_PROVIDER }}
          OAUTH_REDIRECT_URL: ${{ secrets.E2E_OAUTH_REDIRECT_URL || secrets.HOME_FRONT_BASE_URL || 'https://www.aquilaxk.site/' }}
        run: ./.github/scripts/public_smoke.sh

      - name: Run authenticated smoke
        if: ${{ secrets.E2E_ADMIN_USERNAME != '' && secrets.E2E_ADMIN_PASSWORD != '' }}
        env:
          BASE_URL: ${{ secrets.HOME_API_BASE_URL || 'https://api.aquilaxk.site' }}
          LOGIN_USERNAME: ${{ secrets.E2E_ADMIN_USERNAME }}
          LOGIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          EXPECT_ADMIN: "true"
        run: ./.github/scripts/auth_session_smoke.sh
