name: "⚡ Performance"
description: "렌더링, 번들, 대량 조회, 병목 개선 작업을 등록합니다."
labels: ["performance"]
body:
  - type: input
    id: target
    attributes:
      label: Target
      description: 개선 대상 페이지, API, 렌더 경로를 적어주세요.
      placeholder: 예) /posts/[id], GET /post/api/v1/posts/search, front build bundle
    validations:
      required: true

  - type: textarea
    id: scenario
    attributes:
      label: Scenario
      description: 트래픽, 데이터 규모, 사용 시나리오를 적어주세요.
      placeholder: 예) 공개 글 상세 새로고침 시 hydration mismatch와 CLS 급등이 함께 발생
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: Current Metric
      description: 현재 성능 지표를 적어주세요.
      placeholder: 예) p95 3.1s, JS 420KB, CLS 0.38
    validations:
      required: true

  - type: textarea
    id: target_metric
    attributes:
      label: Target Metric
      description: 목표 성능 기준을 적어주세요.
      placeholder: 예) p95 1.2s 이하, JS 300KB 이하, CLS 0.1 이하
    validations:
      required: true

  - type: textarea
    id: hypothesis
    attributes:
      label: Bottleneck / Hypothesis
      description: 병목 원인 추정이나 확인해야 할 포인트를 적어주세요.
      placeholder: 예) 초기 hydration 후 DOM 변형, 검색 쿼리 candidate pool 과다, 이미지 레이아웃 시프트

  - type: textarea
    id: validation
    attributes:
      label: Validation Plan
      description: 개선 후 어떻게 검증할지 적어주세요.
      placeholder: |
        - [ ] 로컬 build / e2e
        - [ ] 실페이지 계측
        - [ ] 메트릭 비교
    validations:
      required: true

  - type: textarea
    id: todo
    attributes:
      label: Todo
      description: 작업 항목을 체크리스트로 적어주세요.
      placeholder: |
        - [ ] 병목 재현
        - [ ] 계측 / 프로파일링
        - [ ] 개선 적용
        - [ ] 성능 재측정
        - [ ] 롤백 기준 정리
    validations:
      required: true
