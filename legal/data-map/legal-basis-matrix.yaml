legalBasis:
  - id: contractAndConsent
    activities:
      - account_registration_email
    rationale: 계정 제공 계약 이행과 약관·개인정보처리방침 동의 증빙
    reviewRequired: 동의 version/hash 저장은 issue996
  - id: contractPreparationAndConsentEvidence
    activities:
      - signup_email_verification
      - kakao_oauth_pending_signup
    rationale: 회원가입 전 이메일 소유 확인과 동의 증빙 연결
    reviewRequired: token hash/URL 제거는 issue998; OAuth pending purge 자동화는 issue1000
  - id: contractAndLegitimateSecurityInterest
    activities:
      - kakao_oauth_existing_login
      - auth_session_and_cookies
    rationale: 로그인 제공과 세션 보안·오남용 방지
    reviewRequired: legacy OAuth provider subject unlink/migration 정책 확정 필요
  - id: contractAndUserPublishedContent
    activities:
      - user_content_posts_comments
      - file_uploads_profile_post_cloud
    rationale: 사용자가 요청한 콘텐츠 게시와 서비스 제공
    reviewRequired: 삭제/export는 issue999
  - id: legitimateSecurityInterest
    activities:
      - auth_security_events
    rationale: 침해 대응과 부정 이용 방지
    reviewRequired: raw identifier 최소화는 issue1001
  - id: legitimateSecurityAndOperationalInterest
    activities:
      - member_action_logs
    rationale: 관리자 작업 감사와 운영 안정성
    reviewRequired: free-text log 축소는 issue1001
  - id: contractAndLegitimateOperationalInterest
    activities:
      - notifications_sse
    rationale: 계정 기능 제공과 이벤트 전달 안정성; notification DB history is purged after custom.privacy.retention.notificationDays, default 60 days
    reviewRequired: []
  - id: consentOrLegitimateAnalyticsInterestReviewRequired
    activities:
      - analytics_and_rum
    rationale: 품질 개선 목적이지만 optional tracking 동의 정책 확정 필요
    reviewRequired: consent manager는 issue1002
  - id: explicitAdminActionAndExternalProcessingReviewRequired
    activities:
      - ai_summary_gemini
    rationale: 향후 관리자 명시 조작 기반 외부 AI 처리 고지·계약 확인 필요
    reviewRequired: AI 안전화는 issue1003
  - id: legitimateOperationalAndSecurityInterest
    activities:
      - backup_and_restore
    rationale: 장애 복구와 데이터 무결성 유지
    reviewRequired: encryption/tombstone은 issue1004

legalReviewNotes:
  - reviewRequired가 있는 activity는 정책 문서에 확정 문구로 쓰지 않는다.
  - SMTP provider, Google Analytics, Gemini optional AI, Cloudflare/Vercel overseas transfer는 실제 계약과 설정 확인 후 확정한다.
  - 법적 리스크 0%는 기술적으로 보장할 수 없으며 출시 gate issue1009에서 전문가 검토 evidence로 관리한다.
