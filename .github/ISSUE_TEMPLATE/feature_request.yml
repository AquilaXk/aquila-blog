name: "✨ Feature"
description: "신규 기능이나 사용자 가치 개선 작업을 등록합니다."
labels: ["feature"]
body:
  - type: input
    id: goal
    attributes:
      label: Goal
      description: 이 기능으로 달성하려는 목표를 적어주세요.
      placeholder: 예) 공개 피드에서 태그와 키워드를 함께 탐색할 수 있게 한다.
    validations:
      required: true

  - type: input
    id: domain
    attributes:
      label: Domain
      description: 관련 도메인 또는 화면을 적어주세요.
      placeholder: 예) feed/search, editor/studio, admin/posts
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: Background
      description: 왜 필요한지, 현재 어떤 불편이 있는지 적어주세요.
      placeholder: 예) 검색/탐색 흐름이 분리돼 사용자가 원하는 글을 찾기 어렵습니다.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: 완료 기준을 체크리스트로 적어주세요.
      placeholder: |
        - [ ] 조건 A
        - [ ] 조건 B
        - [ ] 조건 C
    validations:
      required: true

  - type: textarea
    id: out_of_scope
    attributes:
      label: Out Of Scope
      description: 이번 작업에서 제외할 범위를 적어주세요.
      placeholder: 예) 모바일 앱 대응, 추천 알고리즘 개편은 이번 범위에서 제외

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: SEO, 권한, 캐시, 운영 리스크가 있으면 적어주세요.
      placeholder: 예) 공개 페이지 캐시 정책과 admin 권한 검증 영향을 함께 확인해야 함

  - type: textarea
    id: todo
    attributes:
      label: Todo
      description: 구현 작업을 체크리스트로 적어주세요.
      placeholder: |
        - [ ] 요구사항 구체화
        - [ ] API / 화면 설계
        - [ ] 구현
        - [ ] 테스트
        - [ ] 문서 반영
    validations:
      required: true
