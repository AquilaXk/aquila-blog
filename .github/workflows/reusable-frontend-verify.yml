name: Reusable Frontend Verify

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    env:
      BUNDLE_BUDGET_MARGIN_PERCENT: "5"
      CLS_BUDGET: "0.12"
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Detect frontend-related changes
        id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            frontend:
              - 'front/**'
              - '.github/workflows/frontend-ci.yml'
              - '.github/workflows/ci.yml'
              - '.github/workflows/reusable-frontend-verify.yml'

      - name: Skip frontend-heavy checks
        if: steps.changes.outputs.frontend != 'true'
        run: |
          echo "No frontend-related changes detected."
          {
            echo "## Frontend CI"
            echo "- frontend-heavy checks skipped"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Node.js
        if: steps.changes.outputs.frontend == 'true'
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: front/yarn.lock

      - name: Install dependencies
        if: steps.changes.outputs.frontend == 'true'
        working-directory: front
        run: yarn install --frozen-lockfile

      - name: Lint frontend
        if: steps.changes.outputs.frontend == 'true'
        working-directory: front
        run: yarn lint

      - name: Build frontend
        if: steps.changes.outputs.frontend == 'true'
        working-directory: front
        run: yarn build

      - name: Verify OpenAPI contract-generated types
        if: steps.changes.outputs.frontend == 'true'
        working-directory: front
        run: yarn contracts:check

      - name: Upload OpenAPI contract drift report
        if: failure() && steps.changes.outputs.frontend == 'true'
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: front-openapi-contract-report
          path: front/test-results/contracts-openapi
          if-no-files-found: warn
          retention-days: 7

      - name: Check frontend bundle size budget (warn on PR / strict on main-release)
        if: steps.changes.outputs.frontend == 'true'
        working-directory: front
        env:
          BUNDLE_BUDGET_ENFORCEMENT: ${{ github.event_name == 'pull_request' && 'warn' || ((startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/heads/release')) && 'strict' || 'warn') }}
          BUNDLE_BUDGET_MARGIN_PERCENT: ${{ env.BUNDLE_BUDGET_MARGIN_PERCENT }}
          BUNDLE_REPORT_DIR: test-results/bundle-size
        run: yarn check:bundle-size

      - name: Upload bundle budget report
        if: always() && steps.changes.outputs.frontend == 'true'
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: front-bundle-budget-report
          path: front/test-results/bundle-size
          if-no-files-found: warn
          retention-days: 7

      - name: Check Storybook regression gate
        if: steps.changes.outputs.frontend == 'true'
        working-directory: front
        env:
          STORYBOOK_GATE_ENFORCEMENT: strict
          STORYBOOK_GATE_REPORT_DIR: test-results/storybook
        run: yarn storybook:gate

      - name: Upload Storybook gate report
        if: always() && steps.changes.outputs.frontend == 'true'
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: front-storybook-gate-report
          path: front/test-results/storybook
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Storybook static build
        if: success() && steps.changes.outputs.frontend == 'true'
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: front-storybook-static
          path: front/storybook-static
          if-no-files-found: warn
          retention-days: 7

      - name: Install Playwright browser
        if: steps.changes.outputs.frontend == 'true'
        working-directory: front
        run: npx playwright install --with-deps chromium

      - name: Run smoke e2e
        if: steps.changes.outputs.frontend == 'true'
        working-directory: front
        run: yarn test:e2e:smoke

      - name: Run editor authoring e2e
        if: steps.changes.outputs.frontend == 'true'
        working-directory: front
        run: yarn test:e2e:authoring

      - name: Run CLS perf e2e
        if: steps.changes.outputs.frontend == 'true'
        working-directory: front
        env:
          PLAYWRIGHT_JSON_REPORT_PATH: test-results/perf/playwright-perf.json
          PLAYWRIGHT_PERF_RUNTIME_METRICS_PATH: test-results/perf/runtime-guard-metrics.ndjson
        run: |
          mkdir -p test-results/perf
          : > test-results/perf/runtime-guard-metrics.ndjson
          yarn test:e2e:perf

      - name: Summarize perf e2e report
        if: always() && steps.changes.outputs.frontend == 'true'
        working-directory: front
        run: |
          node scripts/summarize-playwright-json.mjs \
            --input test-results/perf/playwright-perf.json \
            --output test-results/perf/perf-summary.md \
            --append-step-summary

      - name: Compare runtime guard metrics
        if: always() && steps.changes.outputs.frontend == 'true'
        working-directory: front
        run: |
          node scripts/compare-runtime-guard-metrics.mjs \
            --metrics test-results/perf/runtime-guard-metrics.ndjson \
            --baseline ../deploy/homeserver/monitoring/grafana/dashboards/blog-runtime-guard-baseline.json \
            --output test-results/perf/runtime-guard-summary.md \
            --json-output test-results/perf/runtime-guard-summary.json \
            --append-step-summary

      - name: Run accessibility e2e
        if: steps.changes.outputs.frontend == 'true'
        working-directory: front
        run: yarn test:e2e:a11y

      - name: Upload perf e2e report
        if: always() && steps.changes.outputs.frontend == 'true'
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: front-perf-e2e-report
          path: front/test-results/perf
          if-no-files-found: warn
          retention-days: 7

      - name: Upload frontend reports on failure
        if: failure() && steps.changes.outputs.frontend == 'true'
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: front-verify-playwright-report
          path: |
            front/playwright-report
            front/test-results
          retention-days: 7
