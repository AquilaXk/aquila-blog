groups:
  - name: aquila-task-queue
    rules:
      - alert: AquilaTaskQueueBacklogHigh
        expr: task_queue_ready_pending > 500
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Task ready backlog is high"
          description: "ready_pending={{ $value }} for 10m. Consider API/worker split or worker scale-up."

      - alert: AquilaTaskQueueStaleProcessing
        expr: task_queue_stale_processing >= 3
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Stale processing tasks detected"
          description: "stale_processing={{ $value }} for 5m. Check worker health and stuck handlers."

      - alert: AquilaApiLatencyP95High
        expr: |
          (
            histogram_quantile(
              0.95,
              sum by (le) (
                rate(
                  {__name__=~"http_server_requests_seconds_bucket|http_server_request_duration_seconds_bucket",job="back",service="aquila-back",uri!~"/actuator.*"}[5m]
                )
              )
            )
            and on() (
              sum(
                rate(
                  {__name__=~"http_server_requests_seconds_count|http_server_request_duration_seconds_count",job="back",service="aquila-back",uri!~"/actuator.*"}[5m]
                )
              ) > bool 0.2
            )
          ) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "API p95 latency is high"
          description: "p95 > 1s for 10m. Check DB/Redis/task queue pressure."

      - alert: AquilaFeedLatencyP95High
        expr: |
          (
            histogram_quantile(
              0.95,
              sum by (le) (
                rate(
                  {__name__=~"http_server_requests_seconds_bucket|http_server_request_duration_seconds_bucket",job="back",service="aquila-back",uri="/post/api/v1/posts/feed"}[5m]
                )
              )
            )
            and on() (
              sum(
                rate(
                  {__name__=~"http_server_requests_seconds_count|http_server_request_duration_seconds_count",job="back",service="aquila-back",uri="/post/api/v1/posts/feed"}[5m]
                )
              ) > bool 0.05
            )
          ) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Feed API p95 latency is high"
          description: "feed p95 > 1s for 10m. Check post read cache hit, DB latency, and upstream proxy timing."

      - alert: AquilaFeedLatencyP99High
        expr: |
          (
            histogram_quantile(
              0.99,
              sum by (le) (
                rate(
                  {__name__=~"http_server_requests_seconds_bucket|http_server_request_duration_seconds_bucket",job="back",service="aquila-back",uri="/post/api/v1/posts/feed"}[5m]
                )
              )
            )
            and on() (
              sum(
                rate(
                  {__name__=~"http_server_requests_seconds_count|http_server_request_duration_seconds_count",job="back",service="aquila-back",uri="/post/api/v1/posts/feed"}[5m]
                )
              ) > bool 0.05
            )
          ) > 2
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Feed API p99 latency is high"
          description: "feed p99 > 2s for 10m. Investigate outlier queries and upstream saturation."

      - alert: AquilaFeedOutlierOver5sRatioHigh
        expr: |
          (
            (
              sum(
                rate(
                  {__name__=~"http_server_requests_seconds_bucket|http_server_request_duration_seconds_bucket",job="back",service="aquila-back",uri="/post/api/v1/posts/feed",le="+Inf"}[5m]
                )
              )
              -
              sum(
                rate(
                  {__name__=~"http_server_requests_seconds_bucket|http_server_request_duration_seconds_bucket",job="back",service="aquila-back",uri="/post/api/v1/posts/feed",le=~"5|5\\.0"}[5m]
                )
              )
            )
            /
            clamp_min(
              sum(
                rate(
                  {__name__=~"http_server_requests_seconds_count|http_server_request_duration_seconds_count",job="back",service="aquila-back",uri="/post/api/v1/posts/feed"}[5m]
                )
              ),
              0.001
            )
          ) > 0.03
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Feed API >5s outlier ratio is high"
          description: "More than 3% of feed requests exceed 5s for 10m. Verify cache hit ratio, DB plan drift, and timeout budget."

      - alert: AquilaPostReadFeedCacheHitRatioLow
        expr: |
          (
            sum(rate(post_read_cache_result_total{cache=~"post-feed-v4|post-feed-cursor-first-v1",result="hit"}[10m]))
            /
            clamp_min(
              sum(rate(post_read_cache_result_total{cache=~"post-feed-v4|post-feed-cursor-first-v1",result=~"hit|miss"}[10m])),
              0.001
            )
          ) < 0.35
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Post read feed cache hit ratio is low"
          description: "Feed-related cache hit ratio stayed below 35% for 15m. Check cache key churn, TTL, and purge frequency."

      - alert: AquilaFeedOriginErrorRateHigh
        expr: |
          (
            sum(
              rate(
                {__name__=~"http_server_requests_seconds_count|http_server_request_duration_seconds_count",job="back",service="aquila-back",uri="/post/api/v1/posts/feed",status=~"5.."}[5m]
              )
            )
            /
            clamp_min(
              sum(
                rate(
                  {__name__=~"http_server_requests_seconds_count|http_server_request_duration_seconds_count",job="back",service="aquila-back",uri="/post/api/v1/posts/feed"}[5m]
                )
              ),
              0.001
            )
          ) > 0.02
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Feed origin error rate is high"
          description: "Feed 5xx ratio exceeded 2% for 10m. Check backend exceptions, upstream timeout budget, and rollback criteria."

      - alert: AquilaBackScrapeDown
        expr: min(up{job="back",service="aquila-back"}) < 1
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Back metrics scrape is down"
          description: "Prometheus cannot scrape one or more back targets for 3m."

      - alert: AquilaTaskDlqRateHigh
        expr: sum(rate(task_processor_result_total{status="dlq"}[10m])) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Task DLQ rate is above zero"
          description: "DLQ tasks are accumulating. Check failed handlers and replay policy."

      - alert: AquilaPostSearchIndexLagP95High
        expr: histogram_quantile(0.95, sum by (le) (rate(post_search_index_task_lag_seconds_bucket[10m]))) > 120
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Search index async sync lag p95 is high"
          description: "post.search_index.task.lag p95 > 120s for 10m."

  - name: aquila-notification-sse
    rules:
      - alert: AquilaNotificationSseEmitterSaturated
        expr: max(member_notification_sse_global_emitters{job="back",service="aquila-back"}) > 1500
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Notification SSE emitter count is high"
          description: "global emitters > 1500 for 10m. Check reconnect storm, tab churn, or drain failures."

      - alert: AquilaNotificationSseReconnectSpike
        expr: sum(increase(member_notification_sse_reconnect_subscribe_total{job="back",service="aquila-back"}[10m])) > 20
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Notification SSE reconnect spike detected"
          description: "reconnect subscribe count increased sharply in the last 10m. Check QUIC/H3 instability, deploy cutover, or network churn."

      - alert: AquilaNotificationSseSendFailureSpike
        expr: sum(increase(member_notification_sse_send_failure_total{job="back",service="aquila-back"}[10m])) > 5
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Notification SSE send failures are increasing"
          description: "send failure count increased more than 5 in 10m. Check upstream disconnect storm, replay pressure, and transport stability."

  - name: aquila-monitoring-stack
    rules:
      - alert: AquilaPublicEdgeProbeScrapeDown
        expr: min(up{job="public_edge_probe",service="aquila-public-edge-probe"}) < 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Public edge probe scrape is down"
          description: "Prometheus cannot scrape public_edge_probe for 5m. Check the exporter container, live probe refresh loop, and network path."

      - alert: AquilaPublicEdgeColdRatioHigh
        expr: |
          (
            count(aquila_public_edge_probe_request_ttfb_seconds{request_index="1",cache_state=~"MISS|STALE"})
            /
            clamp_min(count(aquila_public_edge_probe_request_ttfb_seconds{request_index="1"}), 1)
          ) > 0.5
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Public edge cold ratio is high"
          description: "More than half of first-request probes are MISS/STALE for 15m. Check deploy churn, cache invalidation frequency, and edge warm-up path."

      - alert: AquilaPublicEdgeFirstRequestTtfbHigh
        expr: max(aquila_public_edge_probe_request_ttfb_seconds{request_index="1"}) > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Public edge first-request TTFB is high"
          description: "Synthetic public route first-request TTFB stayed above 800ms for 10m. Check cold edge cache, origin SSR timing, and deploy recency."

      - alert: AquilaLokiScrapeDown
        expr: min(up{job="loki",service="aquila-loki"}) < 1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Loki metrics scrape is down"
          description: "Prometheus cannot scrape Loki for 3m. Check loki container and network."

      - alert: AquilaPromtailScrapeDown
        expr: min(up{job="promtail",service="aquila-promtail"}) < 1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Promtail metrics scrape is down"
          description: "Prometheus cannot scrape Promtail for 3m. Check promtail container and docker log mount."
