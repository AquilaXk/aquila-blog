name: Monitor Home Server

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare workflow scripts
        run: chmod +x .github/scripts/*.sh

      - name: Run public API smoke
        id: smoke
        shell: bash
        env:
          BASE_URL: ${{ secrets.HOME_API_BASE_URL || 'https://api.aquilaxk.site' }}
          OAUTH_PROVIDER: ${{ secrets.E2E_OAUTH_PROVIDER }}
          OAUTH_REDIRECT_URL: ${{ secrets.E2E_OAUTH_REDIRECT_URL || secrets.HOME_FRONT_BASE_URL || 'https://www.aquilaxk.site/' }}
        run: |
          set -euo pipefail
          if ./.github/scripts/public_smoke.sh > /tmp/public-smoke.log 2>&1; then
            cat /tmp/public-smoke.log
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/public-smoke.log >&2 || true
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          {
            echo "log<<EOF"
            cat /tmp/public-smoke.log || true
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send alert webhook
        if: failure() && (secrets.HOME_ALERT_WEBHOOK_URL != '')
        shell: bash
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.HOME_ALERT_WEBHOOK_URL }}
          BASE_URL: ${{ secrets.HOME_API_BASE_URL || 'https://api.aquilaxk.site' }}
          LOG: ${{ steps.smoke.outputs.log }}
        run: |
          set -euo pipefail
          ESCAPED_LOG="$(printf '%s' "${LOG}" | sed 's/"/\\"/g' | tr '\n' ' ' | cut -c1-700)"
          ESCAPED_URL="$(printf '%s' "${BASE_URL}" | sed 's/"/\\"/g')"

          PAYLOAD="$(cat <<EOF
{"text":"[homeserver-monitor] Public API smoke failed\nbase_url=${ESCAPED_URL}\nlog=${ESCAPED_LOG}"}
EOF
)"

          curl -sS -X POST -H "Content-Type: application/json" -d "${PAYLOAD}" "${ALERT_WEBHOOK_URL}" > /dev/null
