name: Deploy to Home Server

on:
  push:
    branches:
      - main

concurrency:
  group: homeserver-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.HOME_SSH_PRIVATE_KEY }}" > ~/.ssh/home_key
          chmod 600 ~/.ssh/home_key
          if [ -n "${{ secrets.HOME_KNOWN_HOSTS }}" ]; then
            printf '%s\n' "${{ secrets.HOME_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -H "${{ secrets.HOME_HOST }}" >> ~/.ssh/known_hosts
          fi

      - name: Deploy over SSH
        env:
          HOME_HOST: ${{ secrets.HOME_HOST }}
          HOME_SSH_USER: ${{ secrets.HOME_SSH_USER }}
          HOME_SSH_PORT: ${{ secrets.HOME_SSH_PORT }}
          HOME_APP_DIR: ${{ secrets.HOME_APP_DIR }}
          HOME_SERVER_ENV: ${{ secrets.HOME_SERVER_ENV }}
        run: |
          PORT="${HOME_SSH_PORT:-22}"

          ssh -i ~/.ssh/home_key -p "$PORT" "$HOME_SSH_USER@$HOME_HOST" \
            "HOME_APP_DIR='$HOME_APP_DIR' HOME_SERVER_ENV='$HOME_SERVER_ENV' bash -s" <<'REMOTE'
          set -euo pipefail

          cd "${HOME_APP_DIR}"

          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          mkdir -p deploy/homeserver

          if [ -n "${HOME_SERVER_ENV:-}" ]; then
            printf '%s\n' "${HOME_SERVER_ENV}" > deploy/homeserver/.env.prod
          elif [ ! -f deploy/homeserver/.env.prod ]; then
            cp deploy/homeserver/.env.prod.example deploy/homeserver/.env.prod
            echo "deploy/homeserver/.env.prod created from example. Fill required values." >&2
            exit 1
          fi

          docker compose --env-file deploy/homeserver/.env.prod -f deploy/homeserver/docker-compose.prod.yml up -d --build --remove-orphans
          REMOTE
