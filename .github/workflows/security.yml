name: Security

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "23 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  privacy-drift-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Node.js 20
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "20"

      - name: Run privacy drift gate
        run: node tools/privacy/ci-privacy-gate.mjs

  backend-dependency-check:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up JDK 24
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "24"
          cache: gradle

      - name: Run backend dependency vulnerability scan
        id: backend_dependency_scan
        working-directory: back
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -z "${NVD_API_KEY}" ]; then
            echo "ran=false" >> "${GITHUB_OUTPUT}"
            if [ "${GITHUB_EVENT_NAME}" = "pull_request" ] || [ "${GITHUB_EVENT_NAME}" = "push" ]; then
              echo "::warning title=Backend dependency scan skipped::NVD_API_KEY secret is not configured for this ${GITHUB_EVENT_NAME} context; dependency-check requires it for reliable CI scans."
              exit 0
            fi
            echo "::error title=Backend dependency scan blocked::NVD_API_KEY secret is required for scheduled and manual security scans."
            exit 1
          fi
          echo "ran=true" >> "${GITHUB_OUTPUT}"
          ./gradlew --no-daemon dependencyCheckAnalyze

      - name: Upload backend dependency check reports
        if: always() && steps.backend_dependency_scan.outputs.ran == 'true'
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: backend-dependency-check-reports
          path: |
            back/build/reports/dependency-check-report.*
            back/build/reports/dependency-check/
          if-no-files-found: error

  codeql:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language:
          - java-kotlin
          - javascript-typescript
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Fetch PR base ref for design color guard
        if: github.event_name == 'pull_request' && matrix.language == 'javascript-typescript'
        shell: bash
        run: |
          set -euo pipefail
          git fetch --depth=1 origin "${GITHUB_BASE_REF}:refs/remotes/origin/${GITHUB_BASE_REF}"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@256d634097be96e792d6764f9edaefc4320557b1 # v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Set up JDK 24
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "24"
          cache: gradle

      - name: Build JVM sources for CodeQL
        if: matrix.language == 'java-kotlin'
        working-directory: back
        run: ./gradlew --no-daemon classes -x test

      - name: Set up Node.js 20
        if: matrix.language == 'javascript-typescript'
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: front/yarn.lock

      - name: Build web sources for CodeQL
        if: matrix.language == 'javascript-typescript'
        working-directory: front
        run: |
          yarn install --frozen-lockfile
          yarn build

      - name: Perform CodeQL Analysis (trusted context)
        if: github.event_name != 'pull_request' || (github.event.pull_request.head.repo.fork == false && github.actor != 'dependabot[bot]')
        uses: github/codeql-action/analyze@256d634097be96e792d6764f9edaefc4320557b1 # v4

      - name: Perform CodeQL Analysis (no upload for fork/dependabot PR)
        if: github.event_name == 'pull_request' && (github.event.pull_request.head.repo.fork == true || github.actor == 'dependabot[bot]')
        uses: github/codeql-action/analyze@256d634097be96e792d6764f9edaefc4320557b1 # v4
        with:
          upload: never
