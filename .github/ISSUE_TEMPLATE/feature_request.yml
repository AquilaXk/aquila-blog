name: "✨ Feature"
description: "신규 기능이나 사용자 가치가 커지는 개선 작업을 정리합니다."
labels: ["feature"]
body:
  - type: input
    id: goal
    attributes:
      label: Goal
      description: 이 작업으로 어떤 결과를 만들고 싶은지 한 문장으로 적어 주세요.
      placeholder: 예) 공개 피드에서 태그와 키워드를 함께 탐색할 수 있게 한다.
    validations:
      required: true

  - type: input
    id: domain
    attributes:
      label: Domain
      description: 관련 도메인, 화면, API 경로를 적어 주세요.
      placeholder: 예) feed/search, editor/studio, admin/posts
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: Background
      description: 왜 필요한지, 지금 어떤 불편이나 기회가 있는지 설명해 주세요.
      placeholder: 예) 검색/탐색 흐름이 분리돼 사용자가 원하는 글을 찾기 어렵습니다.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: 완료로 볼 기준을 `...했는가?` 형태의 체크리스트로 적어 주세요.
      placeholder: |
        - [ ] 핵심 사용자 흐름이 기대한 방식으로 동작하는지 확인했는가?
        - [ ] 비기능 영향(SEO/권한/캐시 등)을 확인했는가?
        - [ ] 테스트와 문서까지 함께 반영했는가?
    validations:
      required: true

  - type: textarea
    id: out_of_scope
    attributes:
      label: Out Of Scope
      description: 이번 작업에서 의도적으로 제외할 범위를 설명해 주세요.
      placeholder: 예) 모바일 앱 대응, 추천 알고리즘 개편은 이번 범위에서 제외

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: SEO, 권한, 캐시, 운영 리스크처럼 미리 공유해야 할 점을 적어 주세요.
      placeholder: 예) 공개 페이지 캐시 정책과 admin 권한 검증 영향을 함께 확인해야 함

  - type: textarea
    id: todo
    attributes:
      label: Todo
      description: 구현 순서를 `...했는가?` 형태의 체크리스트로 적어 주세요.
      placeholder: |
        - [ ] 요구사항과 제외 범위를 충분히 정리했는가?
        - [ ] API/화면 설계를 확정했는가?
        - [ ] 구현 후 필요한 검증을 마쳤는가?
        - [ ] 문서와 운영 영향까지 반영했는가?
    validations:
      required: true
