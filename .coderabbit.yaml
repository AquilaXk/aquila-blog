# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: ko-KR
tone_instructions: "간결하고 직접적으로 작성하되, 차단급 문제와 개선 제안을 명확히 구분한다."
enable_free_tier: true

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  review_status: true
  review_details: true
  commit_status: true
  fail_commit_status: false
  collapse_walkthrough: true
  changed_files_summary: true
  sequence_diagrams: false
  estimate_code_review_effort: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  suggested_labels: true
  auto_apply_labels: false
  suggested_reviewers: false
  auto_assign_reviewers: false
  in_progress_fortune: false
  poem: false
  enable_prompt_for_ai_agents: false
  abort_on_close: true

  path_filters:
    - "!**/node_modules/**"
    - "!**/.next/**"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/coverage/**"
    - "!**/test-results/**"
    - "!**/playwright-report/**"
    - "!front/public/pdf.worker.min.mjs"
    - "!front/contracts/openapi/**"
    - "!front/packages/shared-contracts/src/generated/**"

  auto_review:
    enabled: true
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 5
    ignore_title_keywords:
      - "[WIP]"
      - "WIP:"
    drafts: false
    ignore_usernames:
      - "dependabot[bot]"

  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false
    simplify:
      enabled: false

  path_instructions:
    - path: "front/**"
      instructions: |
        React/Next.js 변경은 사용자에게 보이는 회귀, hydration 불일치, bundle-size 증가, 접근성, 모바일 레이아웃 깨짐, editor/content rendering 회귀를 우선 검토한다.
        단순 취향성 스타일 변경이나 사소한 네이밍 지적은 실제 유지보수 리스크가 있을 때만 남긴다.
    - path: "back/**"
      instructions: |
        Kotlin/Spring 변경은 API 계약, 트랜잭션 경계, 인증/인가, N+1 쿼리, 동시성, 마이그레이션 호환성, 테스트 누락을 우선 검토한다.
        ktlint나 포맷팅처럼 자동 도구가 잡는 문제는 동작 리스크가 없으면 낮은 우선순위로 다룬다.
    - path: ".github/**"
      instructions: |
        GitHub Actions 변경은 권한 최소화, secret 노출, pull_request_target 안전성, cache key 안정성, required check drift, 배포 조건 누락을 우선 검토한다.
    - path: "sonar-project.properties"
      instructions: |
        Sonar 분석 범위가 현재 운영 모드와 일치하는지 확인한다.
        CI-based analysis에서는 sources/tests/exclusions/coverage report path drift를 우선 검토한다.
        Automatic Analysis 운영 중이면 sonar-project.properties가 실제 분석에 적용되지 않을 수 있음을 지적한다.
        generated/vendor 파일 제외와 CodeRabbit path_filters가 불일치하면 지적한다.
    - path: "deploy/**"
      instructions: |
        배포 변경은 rollback 가능성, secret/env drift, health check, live verification, 홈서버 배포 경로와 main merge 후 자동 배포 계약을 우선 검토한다.
    - path: "tools/**"
      instructions: |
        로컬/CI guard 스크립트는 실패 시그니처가 명확한지, macOS/Linux 양쪽에서 실행 가능한지, destructive command를 안전하게 막는지 우선 검토한다.
